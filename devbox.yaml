$schema: "1.0"
name: "devbox-dotfiles"
userTasks:
  # --- Windows Apps via WinGet ---
  - name: ~/winget
    description: "Install VS Code"
    parameters:
      package: Microsoft.VisualStudioCode

  - name: ~/winget
    description: "Install Windows Terminal"
    parameters:
      package: Microsoft.WindowsTerminal

  - name: ~/winget
    description: "Install PowerToys"
    parameters:
      package: Microsoft.PowerToys

  # --- Accept WinGet source agreements, then install Docker (needs admin) ---
  - name: ~/powershell
    description: "Accept WinGet source agreements and install Docker Desktop"
    parameters:
      command: |
        winget source update --accept-source-agreements
        winget install Docker.DockerDesktop --accept-package-agreements --accept-source-agreements --silent

  # --- Clone dotfiles repo ---
  - name: ~/git-clone
    description: "Clone dotfiles repo"
    parameters:
      repositoryUrl: https://github.com/amansinghoriginal/devbox-dotfiles
      directory: C:\

  # --- Windows-side configuration ---
  - name: ~/powershell
    description: "Run Windows bootstrap script"
    parameters:
      command: C:\devbox-dotfiles\install.ps1

  # --- WSL + Ubuntu setup ---
  - name: ~/powershell
    description: "Install WSL Ubuntu and run setup"
    parameters:
      command: |
        wsl --install --distribution Ubuntu --no-launch
        wsl --update
        # Create default user with passwordless sudo (no hardcoded password)
        wsl -d Ubuntu -- bash -c "
          sudo useradd -m -s /bin/zsh aman
          echo 'aman ALL=(ALL) NOPASSWD:ALL' | sudo tee /etc/sudoers.d/aman
          echo -e '[user]\ndefault=aman' | sudo tee /etc/wsl.conf
        "
        wsl --terminate Ubuntu
        wsl -d Ubuntu -- bash /mnt/c/devbox-dotfiles/wsl-setup.sh
